name: Release create-kerf-component

# Triggered by the same `v*` tag patterns as the kerfjs core release workflow.
# create-kerf-component releases in lockstep with kerfjs — a `v{X}.{Y}.{Z}` tag
# fires release.yml (publishes kerfjs), release-eslint-plugin.yml, and this
# workflow (publishes create-kerf-component). The npm Trusted Publisher rule for
# the package is `v*`, so the OIDC ref pattern accepts the same tags.
#
# Lockstep is enforced at tag time by scripts/release.sh, which bumps the root,
# eslint-plugin/, and create-kerf-component/ package.json to the same version
# before committing and tagging.

# Least-privilege baseline: read-only contents, no OIDC token for any job.
# `id-token: write` (npm OIDC trusted publishing) is granted ONLY to the
# `npm-publish` job, keeping the OIDC-mintable token out of the `test` job that
# runs untrusted install scripts / test code via `npm ci` / `npm test`.
permissions:
  contents: read

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

concurrency:
  group: release-create-kerf-component-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Pinned to 22.21.0 — matches release.yml. See the comment there for the
  # Node 22.22.2 / arborist breakage that motivated the pin.
  NODE_VERSION: '22.21.0'

jobs:
  # ─── Phase 1: validate the initializer ──────────────────────────────

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: create-kerf-component
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          cache-dependency-path: create-kerf-component/package-lock.json
      - run: npm ci
      - run: npm test

  # ─── Detect: stable or beta? ────────────────────────────────────────

  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_beta: ${{ steps.extract.outputs.is_beta }}
    steps:
      - id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-beta.* ]]; then
            IS_BETA=true
          else
            IS_BETA=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_beta=$IS_BETA" >> "$GITHUB_OUTPUT"
          echo "Releasing create-kerf-component v$VERSION (beta: $IS_BETA)"

  # ─── Phase 2: npm publish ───────────────────────────────────────────
  #
  # No GitHub-release job here — the kerfjs core release.yml is the single
  # source for the GitHub Release on each tag. This workflow only owns the
  # create-kerf-component npm publish.

  npm-publish:
    needs: [test, detect]
    runs-on: ubuntu-latest
    environment: npm-publish-create-kerf-component
    permissions:
      contents: read    # checkout
      id-token: write   # npm OIDC trusted publishing
    defaults:
      run:
        working-directory: create-kerf-component
    steps:
      # KF-318 defense-in-depth: create-kerf-component publishes source directly
      # (no build step), so the token-holding job needs no `npm ci` at all — the
      # published `files` come straight from the checkout. Dropping `npm ci`
      # removes dependency-install-script execution from the OIDC-token job; the
      # `test` job above still runs `npm ci` + `npm test` (with no id-token) so
      # the deps are validated. `--ignore-scripts` on publish runs nothing else.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '${{ env.NODE_VERSION }}'
          registry-url: 'https://registry.npmjs.org/'
      # Pinned to the npm 11 line (not @latest): OIDC trusted publishing needs
      # npm ≥ 11.5.1, but npm@12 requires Node ≥ 22.22.2 — above the 22.21.0
      # pin (see NODE_VERSION comment). Revisit when the Node pin is lifted.
      - run: npm install -g npm@11
      - name: Bump package.json to beta version (ephemeral, not committed)
        if: needs.detect.outputs.is_beta == 'true'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish to npm@latest (stable)
        if: needs.detect.outputs.is_beta == 'false'
        run: npm publish --ignore-scripts --provenance --access public
      - name: Publish to npm@beta (beta)
        if: needs.detect.outputs.is_beta == 'true'
        run: npm publish --ignore-scripts --tag beta --provenance --access public

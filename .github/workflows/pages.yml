name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

# Least-privilege baseline: read-only contents, no Pages/OIDC token for any job.
# `pages: write` + `id-token: write` are granted ONLY to the `deploy` job (which
# runs actions/deploy-pages), so the `build` job — which runs `npm ci` install
# scripts + `npm run build` + `npm run site:build` — can't use a Pages OIDC
# token to deploy arbitrary content to the site.
permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      # site:build's prebuild hook handles everything else:
      #   - sync-docs (docs/*.md → Starlight pages)
      #   - build-examples (each complete app → public/run/<name>/, reactivity-demo → public/demo/)
      # Astro then copies public/ into dist/, producing one combined artifact.
      - run: npm run site:build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy the built site
      id-token: write   # OIDC attestation for actions/deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

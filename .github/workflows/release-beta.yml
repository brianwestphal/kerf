name: Release Beta

# Triggered by `v{X}.{Y}.{Z}-beta.{N}` tags created via `npm run release:beta`
# → `bash scripts/release.sh --beta`. Publishes to npm under the `beta` dist-
# tag (so `npm install kerf@beta` works without affecting `kerf@latest`) and
# creates a GitHub Release flagged `prerelease: true`.
#
# Stable tags (`v{X}.{Y}.{Z}`) are handled by `release.yml`. The tag-pattern
# triggers don't overlap.

permissions:
  contents: write
  id-token: write   # npm OIDC trusted publishing

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

concurrency:
  group: release-beta
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Phase 1: validation (parallel) ─────────────────────────────────

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run typecheck

  npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  # ─── Phase 2: GitHub prerelease ─────────────────────────────────────

  create-release:
    needs: [test, lint, typecheck, npm-dry-run]
    runs-on: ubuntu-latest
    outputs:
      beta_version: ${{ steps.extract.outputs.beta_version }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        run: |
          # GITHUB_REF_NAME = "v0.2.0-beta.1" → "0.2.0-beta.1"
          BETA_VERSION="${GITHUB_REF_NAME#v}"
          echo "beta_version=$BETA_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing prerelease v$BETA_VERSION"
      - name: Compose release body
        run: |
          BETA_VERSION="${{ steps.extract.outputs.beta_version }}"
          {
            echo "**Beta / pre-release** — install with \`npm install kerf@beta\`."
            echo
            echo "GitHub's \`releases/latest\` ignores prereleases, so this beta does not affect anyone tracking the stable channel."
            echo
            echo "---"
            echo
            echo "Full annotated tag message follows:"
            echo
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME"
          } > release-body.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.extract.outputs.beta_version }}
          body_path: release-body.md
          prerelease: true
          make_latest: 'false'  # defence-in-depth

  # ─── Phase 3: npm publish under `beta` dist-tag ─────────────────────

  npm-publish-beta:
    needs: [create-release]
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Bump package.json version to beta tag (ephemeral, not committed)
        run: |
          BETA_VERSION="${{ needs.create-release.outputs.beta_version }}"
          npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
      - run: npm run build
      - run: npm publish --tag beta --provenance --access public

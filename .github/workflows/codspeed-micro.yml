# KF-208: CodSpeed micro-bench gate.
#
# Runs `bench/micro/*.bench.ts` (Vitest bench mode) under CodSpeed's
# instruction-count instrument (`mode: simulation` — Valgrind/cachegrind
# under the hood) on every push to main and every PR. CodSpeed posts a
# regression comment to the PR if any microbench moves outside its noise
# band relative to the base commit.
#
# Why instruction count rather than wall time: CI runners (GitHub-hosted
# or otherwise virtualized) have hypervisor / neighbor-VM noise that
# swamps sub-microsecond timing differences. Instruction-count
# measurement is deterministic regardless of the host, so the same
# microbench produces the same number across runs. The full krausest
# bench (wall-time-sensitive end-to-end) is handled separately on
# CodSpeed's macro runners — see KF-209.
#
# Plugin: vitest.config.bench.ts registers @codspeed/vitest-plugin,
# which swaps tinybench's internal timer for the CodSpeed harness when
# `CODSPEED_ENV` is set by the action (no-op locally).
#
# One-time activation (the code is wired but the gate is dark until the
# project is registered):
#   1. Sign in at codspeed.io with the GitHub account that owns this repo.
#   2. Install the CodSpeed GitHub app on brianwestphal/kerf.
#   3. Confirm the OIDC token approach (`id-token: write` below) — if
#      CodSpeed prefers a manual token, add it as a `CODSPEED_TOKEN`
#      repository secret and set `token: ${{ secrets.CODSPEED_TOKEN }}`
#      on the action.

name: CodSpeed (micro)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # OIDC auth with CodSpeed

concurrency:
  group: codspeed-micro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Run micro-benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: npx vitest bench --run --config vitest.config.bench.ts

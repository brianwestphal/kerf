name: Release

# Triggered by either tag pattern:
#   v{X}.{Y}.{Z}             — stable. Created by `npm run release`.
#                              Publishes to npm under `latest`. GitHub Release
#                              flagged as the latest stable.
#   v{X}.{Y}.{Z}-beta.{N}    — beta. Created by `npm run release:beta`.
#                              Publishes to npm under `beta`. GitHub Release
#                              flagged `prerelease: true`.
#
# A single workflow handles both flows because npm allows only one trusted
# publisher connection per package — both stable and beta publishes must run
# from the same workflow filename. The `detect` job sets `is_beta` and every
# downstream job/step branches on it.

# Least-privilege baseline for every job: read-only contents, no OIDC token.
# `id-token: write` (npm OIDC trusted publishing) is granted ONLY to the
# `npm-publish` job, and `contents: write` (create the GitHub Release) ONLY to
# `create-release`. This keeps the OIDC-mintable token out of the validation
# jobs (test / lint / typecheck / npm-dry-run) that run untrusted install
# scripts and test code via `npm ci` / `npm test`.
permissions:
  contents: read

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Pinned to 22.21.0 — Node 22.22.2's setup-node toolcache ships a corrupt
  # bundled npm (its `@npmcli/arborist` is missing `promise-retry`), which
  # crashes any `npm install -g` before it can replace itself. Bumping back
  # to a major-version range (`'22'`) is safe once 22.22.2 ages out.
  NODE_VERSION: '22.21.0'

jobs:
  # ─── Phase 1: validation (parallel) ─────────────────────────────────

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run typecheck

  npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  # KF-319: the dist-regression + repo-hygiene gates that otherwise run only in
  # ci.yml (push/PR) and the local pre-commit hook. A tag pushed directly —
  # bypassing a green PR — would otherwise publish without them. Runs the
  # built-dist suites against a fresh build, plus the feature-coverage /
  # ai-bundle-in-sync / doc-inventory checks. `create-release` gates on it, so
  # npm-publish (which needs create-release) can't run until this passes.
  dist-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npx vitest run --config vitest.config.dist.ts
      - run: npx vitest run --config vitest.config.dist-full.ts
      - run: node scripts/check-doc-test-inventory.mjs
      - run: node scripts/check-doc-api-coverage.mjs
      - run: node scripts/check-feature-coverage.mjs
      - run: node scripts/check-ai-bundle.mjs

  # ─── Detect: is this a stable tag or a beta tag? ────────────────────

  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_beta: ${{ steps.extract.outputs.is_beta }}
    steps:
      - id: extract
        run: |
          # GITHUB_REF_NAME = "v0.2.0" or "v0.2.0-beta.1" → strip leading "v"
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-beta.* ]]; then
            IS_BETA=true
          else
            IS_BETA=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_beta=$IS_BETA" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION (beta: $IS_BETA)"

  # ─── Phase 2: GitHub Release ────────────────────────────────────────

  create-release:
    needs: [test, lint, typecheck, npm-dry-run, dist-gate, detect]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release creates the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG (stable)
        if: needs.detect.outputs.is_beta == 'false'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          # Pull the section between "## [VERSION]" and the next "## [" header.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
      - name: Compose release body (beta)
        if: needs.detect.outputs.is_beta == 'true'
        run: |
          {
            echo "**Beta / pre-release** — install with \`npm install kerfjs@beta\`."
            echo
            echo "GitHub's \`releases/latest\` ignores prereleases, so this beta does not affect anyone tracking the stable channel."
            echo
            echo "---"
            echo
            echo "Full annotated tag message follows:"
            echo
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME"
          } > release-notes.md
      - name: Create GitHub Release (stable)
        if: needs.detect.outputs.is_beta == 'false'
        # SHA-pinned (not @v2) so a retag/compromise of this third-party action
        # can't run arbitrary code in the release flow. Bump the SHA + comment
        # together when upgrading.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.detect.outputs.version }}
          body_path: release-notes.md
          prerelease: false
          make_latest: 'true'
      - name: Create GitHub Release (beta)
        if: needs.detect.outputs.is_beta == 'true'
        # SHA-pinned — see the stable-release step above.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.detect.outputs.version }}
          body_path: release-notes.md
          prerelease: true
          make_latest: 'false'  # defence-in-depth

  # ─── Phase 3: build dist/ (no token) → publish (token) ──────────────
  #
  # KF-318 defense-in-depth: the OIDC-token-holding publish job must NOT run
  # build tools or dependency install scripts. The `build` job runs `npm ci`
  # (which executes esbuild/fsevents/etc. install scripts) and `npm run build`
  # (tsup/esbuild) but holds NO `id-token`, so a compromised build tool or
  # install script there can't mint a publishing token or push a tarball. It
  # hands the built `dist/` to `npm-publish` as an artifact.

  build:
    needs: [create-release, detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - name: Upload built dist/ for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: kerfjs-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  npm-publish:
    needs: [build, detect]
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read    # checkout
      id-token: write   # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      # No `cache: npm` — this job installs nothing (no `npm ci`, no build).
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          registry-url: 'https://registry.npmjs.org/'
      - run: npm install -g npm@latest   # trusted publishing OIDC needs npm ≥ 11.5.1
      - name: Download the built dist/ (produced by the token-less build job)
        uses: actions/download-artifact@v4
        with:
          name: kerfjs-dist
          path: dist/
      - name: Bump package.json to beta version (ephemeral, not committed)
        if: needs.detect.outputs.is_beta == 'true'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      # `--ignore-scripts`: dist/ is already built + downloaded, so skip the
      # `prepublishOnly: npm run build` rebuild — and, more importantly, run NO
      # scripts at all in the token-holding job. The published `files`
      # (dist from the artifact; ai/llms.txt/README/CHANGELOG/LICENSE from
      # checkout) are all present without a dependency install.
      - name: Publish to npm@latest (stable)
        if: needs.detect.outputs.is_beta == 'false'
        run: npm publish --ignore-scripts --provenance --access public
      - name: Publish to npm@beta (beta)
        if: needs.detect.outputs.is_beta == 'true'
        run: npm publish --ignore-scripts --tag beta --provenance --access public

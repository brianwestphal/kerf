name: Release

# Triggered by `v{X}.{Y}.{Z}` tags created via `npm run release` →
# `bash scripts/release.sh`. Publishes to npm under the `latest` dist-tag and
# creates a GitHub Release flagged as the latest stable.
#
# Beta tags (`v*-beta.*`) are handled by `release-beta.yml` instead. The two
# tag patterns don't overlap.

permissions:
  contents: write
  id-token: write   # npm OIDC trusted publishing

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-stable
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ─── Phase 1: validation (parallel) ─────────────────────────────────

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run typecheck

  npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run

  # ─── Phase 2: GitHub Release ────────────────────────────────────────

  create-release:
    needs: [test, lint, typecheck, npm-dry-run]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          # Pull the section between "## [VERSION]" and the next "## [" header.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.extract.outputs.version }}
          body_path: release-notes.md
          prerelease: false
          make_latest: 'true'

  # ─── Phase 3: npm publish ───────────────────────────────────────────

  npm-publish:
    needs: [create-release]
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

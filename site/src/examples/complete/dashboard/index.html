<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>kerf · Realtime dashboard</title>
    <style>
      body { font-family: system-ui; background: #0f172a; color: #f1f5f9; margin: 0; padding: 0; }
      .dash { padding: 1rem; max-width: 900px; margin: 0 auto; }
      header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; background: #1e293b; border-radius: 6px; }
      .status.live  { color: #22d3ee; }
      .status.down  { color: #fb7185; }
      .frame { color: #94a3b8; font-family: ui-monospace, monospace; }
      .up { margin-left: auto; color: #4ade80; font-family: ui-monospace, monospace; }
      .chart-host { background: #0f172a; border-radius: 4px; padding: 2px; }
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-family: ui-monospace, monospace; font-size: 0.85rem; }
      th, td { padding: 0.25rem 0.75rem; text-align: left; border-bottom: 1px solid #334155; }
      th { background: #1e293b; }
      .num { text-align: right; }
      tr.up   td.num { color: #4ade80; }
      tr.down td.num { color: #fb7185; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

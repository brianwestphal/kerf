<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>kerf · Built by an AI · Pomodoro</title>
    <style>
      body { font-family: system-ui; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: white; }
      .pom { text-align: center; padding: 3rem 4rem; border-radius: 16px; transition: background 0.5s; }
      .pom.focus { background: #be123c; }
      .pom.break { background: #15803d; }
      .mode { font-size: 0.9rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.8; }
      .time { font-size: 6rem; font-family: ui-monospace, monospace; font-weight: 700; line-height: 1; margin: 0.5rem 0; }
      .controls { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; }
      button { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 0.5rem 1.25rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
      button:hover { background: rgba(255,255,255,0.25); }
      .completed { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

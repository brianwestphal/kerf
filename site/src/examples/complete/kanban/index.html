<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>kerf · Mini Kanban</title>
    <style>
      body { font-family: system-ui; background: #f3f4f6; margin: 0; padding: 2rem; }
      .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 1200px; margin: 0 auto; }
      .col { background: #e5e7eb; border-radius: 8px; padding: 1rem; min-height: 400px; }
      .col h2 { margin: 0 0 0.75rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #4b5563; }
      .cards { list-style: none; padding: 0; margin: 0; min-height: 100px; display: flex; flex-direction: column; gap: 0.5rem; }
      .card { background: white; padding: 0.75rem; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: grab; user-select: none; touch-action: none; }
      .card.dragging { box-shadow: 0 6px 16px rgba(0,0,0,0.2); cursor: grabbing; opacity: 0.9; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>kerf · Live poll (no build step)</title>
    <!--
      The no-build example: this page + main.js is the WHOLE app. The importmap
      below resolves kerfjs to plain static files (copied next to this page by
      the site build — see site/scripts/lib/copy-no-build-app.mjs). There is no
      bundler and no transform; view-source shows exactly what runs.
    -->
    <script type="importmap">
      {
        "imports": {
          "kerfjs": "./vendor/kerfjs/index.js",
          "kerfjs/html": "./vendor/kerfjs/html.js",
          "@preact/signals-core": "./vendor/signals-core.mjs"
        }
      }
    </script>
    <style>
      body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; padding: 1.5rem; color: #1f2937; }
      .poll { max-width: 560px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.25rem 1.5rem; }
      h1 { font-size: 1.3rem; margin: 0 0 0.25rem; }
      .poll-lede { color: #555; margin: 0 0 1rem; font-size: 0.9rem; }
      .opts { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.6rem; }
      .opt-btn {
        display: block; width: 100%; text-align: left; cursor: pointer;
        background: #fafafa; border: 1px solid #e5e7eb; border-radius: 6px;
        padding: 0.55rem 0.75rem; font: inherit; color: inherit;
      }
      .opt-btn:hover { background: #eff6ff; border-color: #2563eb; }
      .opt-row { display: flex; justify-content: space-between; align-items: baseline; gap: 0.75rem; }
      .opt-label { font-size: 0.9rem; }
      .opt-count { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; color: #2563eb; }
      .opt-track { display: block; height: 6px; margin-top: 0.45rem; background: #f1f5f9; border-radius: 3px; overflow: hidden; }
      .opt-bar { display: block; height: 100%; width: 0; background: #2563eb; border-radius: 3px; transition: width 300ms cubic-bezier(0.215, 0.61, 0.355, 1); }
      .poll-foot {
        display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem;
        padding-top: 0.75rem; border-top: 1px solid #e5e7eb; font-size: 0.85rem; color: #555;
      }
      .poll-foot b { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #1f2937; }
      .poll-renders { margin-left: auto; }
      .poll-renders b { color: #2563eb; }
      .poll-reset {
        padding: 0.3rem 0.7rem; border: 1px solid #cbd5e1; background: #fff;
        border-radius: 5px; cursor: pointer; font-size: 0.8rem;
      }
      .poll-reset:hover { background: #fef2f2; border-color: #dc2626; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>

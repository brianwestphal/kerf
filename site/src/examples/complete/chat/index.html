<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>kerf · Chat UI</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121830;
        --panel-2: #1a2142;
        --border: #232b52;
        --text: #e8ecff;
        --text-dim: #9aa3c7;
        --accent: #6f7bff;
        --accent-2: #b96bff;
        --user: linear-gradient(135deg, #6f7bff, #b96bff);
        --bot: #1a2142;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: radial-gradient(1200px 800px at 20% -10%, #1a2247 0%, var(--bg) 60%);
        color: var(--text);
        display: flex;
        align-items: stretch;
        justify-content: center;
      }
      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        width: 100%;
        max-width: 720px;
        height: 100vh;
        background: var(--panel);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(111,123,255,0.08), transparent);
      }
      .brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; }
      .logo {
        width: 28px; height: 28px; border-radius: 8px;
        background: var(--user);
        display: grid; place-items: center;
        font-size: 0.85rem; font-weight: 800; color: white;
      }
      .status { font-size: 0.78rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.4rem; }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; }
      .dot.busy { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; animation: pulse 1.2s infinite; }
      @keyframes pulse { 50% { opacity: 0.4; } }

      .messages {
        overflow-y: auto;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        scroll-behavior: smooth;
      }
      .msg { display: flex; max-width: 85%; }
      .msg.user { align-self: flex-end; }
      .msg.bot { align-self: flex-start; }
      .bubble {
        padding: 0.7rem 0.95rem;
        border-radius: 14px;
        line-height: 1.45;
        font-size: 0.95rem;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .msg.user .bubble {
        background: var(--user);
        color: white;
        border-bottom-right-radius: 4px;
      }
      .msg.bot .bubble {
        background: var(--bot);
        color: var(--text);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
      }
      .caret {
        display: inline-block;
        width: 7px; height: 1em;
        background: var(--accent);
        margin-left: 2px;
        vertical-align: -2px;
        animation: blink 1s infinite;
        border-radius: 1px;
      }
      @keyframes blink { 50% { opacity: 0; } }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0 1.25rem 0.5rem;
      }
      .chip {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        font-size: 0.78rem;
        cursor: pointer;
        transition: color 120ms, border-color 120ms;
      }
      .chip:hover { color: var(--text); border-color: var(--accent); }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
        padding: 0.75rem 1.25rem 1rem;
        border-top: 1px solid var(--border);
        background: var(--panel);
      }
      .composer textarea {
        resize: none;
        min-height: 44px;
        max-height: 160px;
        padding: 0.7rem 0.9rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        outline: none;
      }
      .composer textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(111,123,255,0.2); }
      .composer button {
        background: var(--user);
        border: 0;
        color: white;
        font-weight: 600;
        padding: 0 1rem;
        border-radius: 10px;
        cursor: pointer;
        min-width: 80px;
      }
      .composer button:disabled { opacity: 0.55; cursor: not-allowed; }

      .copy {
        margin-top: 0.25rem;
        font-size: 0.72rem;
        color: var(--text-dim);
        background: transparent;
        border: 0;
        padding: 0;
        cursor: pointer;
      }
      .copy:hover { color: var(--accent); }
      .msg.user .meta { text-align: right; }
    </style>
  </head>
  <body>
    <div id="app" class="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

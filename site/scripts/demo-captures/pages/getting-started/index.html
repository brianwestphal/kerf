<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>kerf · getting-started coding session (capture page)</title>
    <!--
      Static capture page for the animated end-to-end coding session on the
      Getting-started docs page + README.

      All four "windows" (editor / terminal / browser / end card) stay in the
      DOM at all times, each carrying a data-magic-key; scenes are per-window
      transform states keyed off body[data-scene]. Scene changes are captured
      with magic-move transitions, so windows glide/scale between their front
      and parked positions like a user switching apps — no page JS animation.

      The capture config drives everything through small window.* helpers:
        scene(name)          — switch scene state
        S(i)                 — editor snapshot i of the v1 typing progression
        E(i)                 — editor snapshot i of the v2 edit progression
        term(n)              — reveal first n terminal lines
        clickCounter()       — (bound to real button; config clicks it)
      Editor "typing" is domotion typing overlays anchored to empty line spans;
      the following frame swaps in the syntax-colored line.
    -->
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0; width: 760px; height: 560px; overflow: hidden;
        font-family: system-ui, sans-serif; background: #e8eaee; position: relative;
      }
      .window {
        position: absolute; top: 18px; left: 18px;
        width: 724px; height: 524px; border-radius: 10px; overflow: hidden;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.35); display: flex; flex-direction: column;
        background: #fff;
      }

      /* ---- scene states: every window has a transform in every scene ----
         Parked windows stay INSIDE the viewport (small scale, fully tucked
         under the opaque 724x524 front window so they serialize but never
         show). The app-switch glides are NOT CSS transitions — each switch
         frame is a hard cut whose capture config animates the two windows'
         `transform` from the previous scene's value to this scene's value
         (see gen-getting-started.mjs SWITCHES), giving the scale+path
         "switching apps" motion deterministically. Park positions therefore
         define each window's entry/exit path direction and MUST stay in sync
         with the from/to transforms in the gen script. */
      /* The desktop backdrop sits ABOVE parked windows (z 3) and BELOW any
         window participating in the current scene, so parked windows stay
         serialized but invisible; only the entering (z 6) and exiting (z 5)
         windows of a switch ever show over it. */
      .desktop { position: absolute; inset: 0; background: #e8eaee; z-index: 3; }
      /* front */
      body[data-scene='editor']   .window.editor,
      body[data-scene='terminal'] .window.terminal,
      body[data-scene='browser']  .window.browser,
      body[data-scene='end']      .window.end { transform: translate(0, 0) scale(1); z-index: 6; }
      /* parked defaults (under the desktop backdrop) */
      .window.editor   { transform: translate(-300px, 175px) scale(0.12); z-index: 2; } /* left  → exits/returns via bottom-left */
      .window.terminal { transform: translate(300px, 175px) scale(0.12); z-index: 2; }  /* right → enters from bottom-right */
      .window.browser  { transform: translate(0px, 215px) scale(0.14); z-index: 2; }    /* bottom-center → pops up + grows like a new window */
      /* display:none until its scene — serializing the parked end card in
         every earlier frame made the optimizer collide its font subset with
         other frames' (the wordmark rendered with overlapping glyphs). It only
         needs to exist in the final frame, where its glide animates from the
         park transform anyway. */
      .window.end      { transform: translate(0, 195px) scale(0.22); z-index: 1; display: none; }
      body[data-scene='end'] .window.end { display: flex; }
      /* the window EXITING in each scene rides above the desktop while it glides out */
      body[data-scene='terminal'] .window.editor { z-index: 5; }
      body[data-scene='browser']  .window.terminal { z-index: 5; }
      body[data-scene='browser']  .window.editor { z-index: 5; }
      body[data-scene='editor'][data-visited='1'] .window.browser { z-index: 5; }
      body[data-scene='end'] .window.browser { z-index: 5; }
      /* after the browser opens, the terminal parks left (it exited stage-left) */
      body[data-scene='browser'] .window.terminal,
      body[data-scene='end'] .window.terminal { transform: translate(-300px, 205px) scale(0.10); }
      /* when we return to the editor, the browser parks right (slides back out) */
      body[data-scene='editor'][data-visited='1'] .window.browser { transform: translate(300px, 205px) scale(0.14); }

      .titlebar {
        height: 34px; flex: none; display: flex; align-items: center; gap: 8px;
        padding: 0 12px; font-size: 12px; color: #94a3b8;
      }
      .dots { display: flex; gap: 6px; }
      .dots i { width: 11px; height: 11px; border-radius: 50%; }
      .dots i:nth-child(1) { background: #ff5f57; } .dots i:nth-child(2) { background: #febc2e; } .dots i:nth-child(3) { background: #28c840; }
      .titlebar .title { flex: 1; text-align: center; margin-right: 45px; }

      /* --- editor ---------------------------------------------------- */
      .window.editor { background: #1e293b; }
      .editor .titlebar { background: #0f172a; }
      .tabbar { height: 30px; flex: none; background: #0f172a; display: flex; align-items: flex-end; padding: 0 10px; }
      .tab {
        background: #1e293b; color: #e2e8f0; font-size: 11.5px; border-radius: 6px 6px 0 0;
        padding: 6px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .tab .dot { color: #fbbf24; margin-left: 6px; }
      .codearea {
        flex: 1; padding: 10px 0; font-family: Menlo, ui-monospace, monospace;
        font-size: 12.5px; line-height: 19px; color: #e2e8f0; overflow: hidden;
      }
      .ln { display: flex; white-space: pre; height: 19px; }
      .ln .no { width: 40px; flex: none; text-align: right; padding-right: 14px; color: #475569; user-select: none; }
      .ln.ln-new { background: #2563eb22; }
      .kw { color: #93c5fd; } .str { color: #86efac; } .num { color: #fbbf24; }
      .tag { color: #f9a8d4; } .attr { color: #7dd3fc; } .hole { color: #fbbf24; }
      .sel { background: #3b82f6aa; border-radius: 2px; }
      .caret { display: inline-block; width: 7px; height: 14px; background: #e2e8f0; vertical-align: -2px; }
      /* empty typing-anchor slots need a real box for overlay anchoring */
      [id^='Lc'], #ins-imp, #rep-cls, #term-cmd { display: inline-block; height: 15px; min-width: 1px; vertical-align: -3px; }

      /* --- terminal --------------------------------------------------- */
      .window.terminal { background: #0f172a; }
      .terminal .titlebar { background: #020617; }
      .termarea {
        flex: 1; padding: 14px 18px; font-family: Menlo, ui-monospace, monospace;
        font-size: 13px; line-height: 22px; color: #e2e8f0; white-space: pre-wrap;
      }
      .t-dim { color: #64748b; } .t-green { color: #4ade80; } .t-cyan { color: #22d3ee; }
      .t-vite { color: #a78bfa; font-weight: 600; }
      #local-link { color: #22d3ee; text-decoration: underline; cursor: pointer; }

      /* --- browser ---------------------------------------------------- */
      .browser .titlebar { background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
      .urlbar {
        flex: 1; background: #fff; border: 1px solid #e2e8f0; border-radius: 999px;
        font-size: 11.5px; color: #475569; padding: 4px 14px; margin: 0 30px;
        font-family: Menlo, ui-monospace, monospace;
      }
      .page { flex: 1; background: #f8fafc; overflow: hidden; position: relative; }
      .hmr {
        position: absolute; right: 12px; bottom: 10px; font-size: 11px;
        font-family: Menlo, ui-monospace, monospace; color: #7c3aed;
        background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 6px; padding: 3px 10px;
        display: none;
      }
      body[data-hmr='1'] .hmr { display: block; }
      .appwrap { text-align: center; padding-top: 150px; }
      .btn {
        font: inherit; font-size: 17px; background: #2563eb; color: #fff; border: 0;
        border-radius: 8px; padding: 12px 26px; cursor: pointer; box-shadow: 0 2px 8px #2563eb44;
      }
      .btn.hot { background: #ea580c; box-shadow: 0 2px 14px #ea580c66; }

      /* --- end card ---------------------------------------------------- */
      /* content pushed below y≈240: the capture's simulated cursor stays
         parked at the last counter-click spot (~380,224), so the space above
         the wordmark is deliberately empty for it. */
      .window.end { background: #0f172a; align-items: center; justify-content: flex-start; }
      .endcard { text-align: center; color: #e2e8f0; padding-top: 250px; }
      /* Menlo, not system-ui bold @44px: domotion's multi-frame font
         subsetting renders that face with overlapping glyphs (single-frame
         captures are fine); Menlo is exercised at many sizes across the whole
         session and stays clean — and suits the dev-tool theme anyway. */
      .endcard .mark { font-size: 40px; font-weight: 700; font-family: Menlo, ui-monospace, monospace; }
      .endcard .cut { color: #64748b; font-size: 15px; margin-top: 2px; font-style: italic; }
      .endcard .install {
        margin-top: 26px; font-family: Menlo, ui-monospace, monospace;
        font-size: 16px; background: #1e293b; border: 1px solid #334155;
        border-radius: 8px; padding: 12px 26px; display: inline-block;
      }
      .endcard .install .t-dim { color: #64748b; }
      .endcard .sub { margin-top: 16px; font-size: 13px; color: #94a3b8; }
    </style>
  </head>
  <body data-scene="editor">
    <div class="desktop"></div>
    <!-- ============ end card (bottom of stack) ============ -->
    <div class="window end" data-magic-key="win-end">
      <div class="endcard">
        <div class="mark">kerf</div>
        <div class="cut">The smallest cut.</div>
        <div class="install"><span class="t-dim">$</span> npm install kerfjs</div>
        <div class="sub">~11 KB · no virtual DOM · no compiler · your existing build (or none at all)</div>
      </div>
    </div>

    <!-- ============ browser ============ -->
    <div class="window browser" data-magic-key="win-browser">
      <div class="titlebar"><span class="dots"><i></i><i></i><i></i></span><span class="urlbar">localhost:5173</span></div>
      <div class="page">
        <div class="appwrap"><button class="btn" id="counter-btn">Clicked 0 times</button></div>
        <div class="hmr">[vite] hot updated: /app.tsx</div>
      </div>
    </div>

    <!-- ============ terminal ============ -->
    <div class="window terminal" data-magic-key="win-terminal">
      <div class="titlebar"><span class="dots"><i></i><i></i><i></i></span><span class="title">my-app — zsh</span></div>
      <div class="termarea" id="term"></div>
    </div>

    <!-- ============ editor (top when front) ============ -->
    <div class="window editor" data-magic-key="win-editor">
      <div class="titlebar"><span class="dots"><i></i><i></i><i></i></span><span class="title">my-app — Visual Studio Code</span></div>
      <div class="tabbar"><span class="tab">app.tsx<span class="dot">●</span></span></div>
      <div class="codearea" id="code"></div>
    </div>

    <script>
      const K = (s) => `<span class="kw">${s}</span>`;
      const S_ = (s) => `<span class="str">${s}</span>`;
      const T = (s) => `<span class="tag">${s}</span>`;
      const A = (s) => `<span class="attr">${s}</span>`;
      const H = (s) => `<span class="hole">${s}</span>`;
      const N = (s) => `<span class="num">${s}</span>`;

      // --- v1 program, syntax-colored, one entry per line -----------------
      const L1  = `${K('import')} { signal, mount, delegate } ${K('from')} ${S_("'kerfjs'")};`;
      const L3  = `${K('const')} count = signal(${N('0')});`;
      const L4  = `${K('const')} root = document.getElementById(${S_("'app'")})!;`;
      const L6  = `mount(root, () ${K('=>')} (`;
      const L7  = `  &lt;${T('button')} <span id="cls-attr">${A('class')}=${S_('"btn"')}</span> ${A('data-action')}=${S_('"inc"')}&gt;`;
      const L8  = `    Clicked ${H('{count}')} times`;
      const L9  = `  &lt;/${T('button')}&gt;`;
      const L10 = `));`;
      const L12 = `delegate(root, ${S_("'click'")}, ${S_('\'[data-action="inc"]\'')}, () ${K('=>')} count.value++);`;

      // --- the v2 edit pieces --------------------------------------------
      const L1v2 = `${K('import')} { signal,<span id="ins-imp"></span> mount, delegate } ${K('from')} ${S_("'kerfjs'")};`;
      const L1v2done = `${K('import')} { signal, computed, mount, delegate } ${K('from')} ${S_("'kerfjs'")};`;
      const LCLS = `${K('const')} cls = computed(() ${K('=>')} count.value &gt;= ${N('5')} ? ${S_("'btn hot'")} : ${S_("'btn'")});`;
      const L7sel  = `  &lt;${T('button')} ${A('class')}=<span class="sel">${S_('"btn"')}</span> ${A('data-action')}=${S_('"inc"')}&gt;`;
      const L7hole = `  &lt;${T('button')} ${A('class')}=<span id="rep-cls"></span> ${A('data-action')}=${S_('"inc"')}&gt;`;
      const L7v2   = `  &lt;${T('button')} ${A('class')}=${H('{cls}')} ${A('data-action')}=${S_('"inc"')}&gt;`;

      // A doc is an array of [html, flags]; flags: 'empty' renders an empty
      // typing anchor (<span id=Lc>), 'new' highlights the line, 'caret'
      // appends a caret.
      const el = (html) => html;
      function render(doc) {
        document.getElementById('code').innerHTML = doc
          .map((entry, i) => {
            const [html, flags = ''] = Array.isArray(entry) ? entry : [entry];
            const anchor = flags.includes('empty') ? `<span id="Lc${i + 1}"></span>` : html;
            const caret = flags.includes('caret') ? '<span class="caret"></span>' : '';
            const cls = flags.includes('new') ? ' ln-new' : '';
            return `<div class="ln${cls}"><span class="no">${i + 1}</span><span>${anchor}${caret}</span></div>`;
          })
          .join('');
      }

      // --- v1 typing snapshots: each S(i) leaves line i's slot EMPTY with an
      // anchor so the config's typing overlay lands on it; S(i+1) swaps the
      // real colored line in and empties the next slot.
      const D = (...rows) => rows;
      const V1SNAPS = [
        D(['', 'empty']),                                                     // S0: about to type L1
        D(L1, '', ['', 'empty']),                                             // S1: L1 done; typing L3
        D(L1, '', L3, ['', 'empty']),                                         // S2: typing L4
        D(L1, '', L3, L4, '', ['', 'empty']),                                 // S3: typing L6
        D(L1, '', L3, L4, '', L6, ['', 'empty']),                             // S4: typing L7
        D(L1, '', L3, L4, '', L6, L7, ['', 'empty']),                         // S5: typing L8
        D(L1, '', L3, L4, '', L6, L7, L8, ['', 'empty']),                     // S6: typing L9
        D(L1, '', L3, L4, '', L6, L7, L8, L9, ['', 'empty']),                 // S7: typing L10
        D(L1, '', L3, L4, '', L6, L7, L8, L9, L10, '', ['', 'empty']),        // S8: typing L12
        D(L1, '', L3, L4, '', L6, L7, L8, L9, L10, '', [L12, 'caret']),       // S9: v1 complete
        D(L1, '', L3, L4, '', L6, L7, L8, L9, L10, '', L12),                  // S10: settled
      ];
      window.S = (i) => render(V1SNAPS[i]);

      // --- v2 edit snapshots ---------------------------------------------
      const E0 = D(L1v2, '', L3, L4, '', L6, L7, L8, L9, L10, '', L12);                    // caret in import, anchor #ins-imp
      const E1 = D(L1v2done, '', L3, ['', 'empty'], L4, '', L6, L7, L8, L9, L10, '', L12); // import done; new line 4 open, typing cls
      const E2 = D(L1v2done, '', L3, [LCLS, 'new'], L4, '', L6, L7, L8, L9, L10, '', L12); // cls line landed
      const E3 = D(L1v2done, '', L3, LCLS, L4, '', L6, L7sel, L8, L9, L10, '', L12);       // "btn" selected
      const E4 = D(L1v2done, '', L3, LCLS, L4, '', L6, L7hole, L8, L9, L10, '', L12);      // selection deleted, typing {cls} at #rep-cls
      const E5 = D(L1v2done, '', L3, LCLS, L4, '', L6, [L7v2, 'new'], L8, L9, L10, '', L12); // hole landed
      const E6 = D(L1v2done, '', L3, LCLS, L4, '', L6, L7v2, L8, L9, L10, '', L12);        // settled
      const ESNAPS = [E0, E1, E2, E3, E4, E5, E6];
      window.E = (i) => render(ESNAPS[i]);

      /* ---------- terminal ---------- */
      let termCmdText = '';
      let termShown = 0;
      const termLines = () => [
        `<span class="t-dim">~/my-app</span> <span class="t-green">$</span> <span id="term-cmd">${termCmdText}</span>`,
        ``,
        `  <span class="t-vite">VITE v6.0.3</span>  <span class="t-green">ready in 213 ms</span>`,
        ``,
        `  <span class="t-green">➜</span>  Local:   <a id="local-link">http://localhost:5173/</a>`,
        `  <span class="t-green">➜</span>  Network: use --host to expose`,
      ];
      const termRender = () => {
        document.getElementById('term').innerHTML = termLines().slice(0, termShown).join('\n');
      };
      window.term = (n) => { termShown = n; termRender(); };
      window.termCmd = (cmd) => { termCmdText = cmd; termRender(); };

      /* ---------- scene + mock app ---------- */
      window.scene = (s) => { document.body.dataset.scene = s; };
      window.visited = () => { document.body.dataset.visited = '1'; };
      window.hmr = (on) => { if (on) document.body.dataset.hmr = '1'; else delete document.body.dataset.hmr; };

      // The mock app behaves EXACTLY like the code on screen: the label is
      // always `Clicked {count} times` (no pluralization the code doesn't
      // have), and once the v2 edit ships, count >= 5 flips the bound class.
      let clicks = 0;
      window.v2live = false;
      document.getElementById('counter-btn').addEventListener('click', () => {
        clicks += 1;
        const btn = document.getElementById('counter-btn');
        btn.textContent = `Clicked ${clicks} times`;
        if (window.v2live) btn.classList.toggle('hot', clicks >= 5);
      });

      window.S(0);
      window.term(0);
    </script>
  </body>
</html>
